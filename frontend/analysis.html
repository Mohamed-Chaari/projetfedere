<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse - Tunisia Meteo</title>
  <link rel="stylesheet" href="/frontend/assets/css/theme.css">
  <link rel="stylesheet" href="/frontend/assets/css/layout.css">
  <link rel="stylesheet" href="/frontend/assets/css/components.css">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <style>
    /* Filters Bar */
    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      align-items: center;
      background: var(--bg-card);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .form-select {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      min-width: 200px;
    }
    .btn-export {
      margin-left: auto;
      background: var(--border);
      color: var(--text-primary);
      border: 1px solid var(--accent-cyan);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-export:hover {
      background: var(--accent-cyan);
      color: #0D1B2A;
    }

    /* 2x2 Charts Grid */
    .charts-grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
      position: relative;
    }
    @media (max-width: 1024px) {
      .charts-grid-2x2 { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    .chart-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .plotly-container {
      width: 100%;
      height: 300px;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-glass);
      backdrop-filter: blur(4px);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      display: none; /* hidden by default */
    }

    /* Data Table */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(10px);
      overflow-x: auto;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .data-table th, .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .data-table th:hover { color: var(--accent-cyan); }
    .data-table tr:hover td { background: rgba(0, 212, 255, 0.05); }
    .data-table td { color: var(--text-primary); }
    .sort-icon { font-size: 0.8rem; margin-left: 4px; color: var(--text-muted); }

  </style>
</head>
<body>
  <video id="bg-video" autoplay muted loop class="video-bg">
    <source src="/frontend/assets/videos/cloudy.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div id="navbar-placeholder"></div>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Analyse Mensuelle</h1>
      <p class="page-subtitle">Moyennes météorologiques historiques et comparatives.</p>
    </div>

    <!-- Filters -->
    <div class="controls-bar">
      <select id="filter-year" class="form-select">
        <!-- populated via JS -->
      </select>
      <select id="filter-region" class="form-select">
        <option value="">Toutes les Régions</option>
        <!-- populated via JS -->
      </select>
      <select id="filter-gov" class="form-select" disabled>
        <option value="">Tous les Gouvernorats</option>
      </select>
      <button class="btn-export" onclick="exportToCSV()">📥 Exporter CSV</button>
    </div>

    <!-- Charts -->
    <div style="position: relative;">
      <div id="charts-loading" class="loading-overlay">
        <div class="spinner"></div>
      </div>

      <div class="charts-grid-2x2">
        <div class="chart-card">
          <div class="chart-title">Températures Mensuelles (°C)</div>
          <div id="chart-temp" class="plotly-container"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Précipitations (mm)</div>
          <div id="chart-precip" class="plotly-container"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Humidité Relative (%)</div>
          <div id="chart-humidity" class="plotly-container"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Vitesse du Vent (km/h)</div>
          <div id="chart-wind" class="plotly-container"></div>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="table-container">
      <table class="data-table" id="analysis-table">
        <thead>
          <tr>
            <th onclick="sortTable(0, 'number')">Mois <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(1, 'number')">Temp Moy <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(2, 'number')">Max <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(3, 'number')">Min <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(4, 'number')">Humidité <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(5, 'number')">Précip. <span class="sort-icon">⇅</span></th>
            <th onclick="sortTable(6, 'number')">Vent <span class="sort-icon">⇅</span></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Injected via JS -->
          <tr><td colspan="7" style="text-align: center;">Chargement...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/auth.js"></script>
  <script src="/frontend/assets/js/theme.js"></script>
  <script src="/frontend/assets/js/video-bg.js"></script>

  <script>
    const MONTHS = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];
    let currentData = [];
    let sortDirection = {}; // stores sort direction per column

    async function loadNavbar() {
      const res = await fetch('/frontend/assets/components/navbar.html');
      const html = await res.text();
      document.getElementById('navbar-placeholder').innerHTML = html;
      const page = window.location.pathname.split('/').pop();
      document.querySelector(`a[href="${page}"]`)?.classList.add('active');
    }

    function setupFilters() {
      const yearSelect = document.getElementById('filter-year');
      const currentYear = new Date().getFullYear();
      for(let y = currentYear; y >= 2020; y--) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = `Année ${y}`;
        yearSelect.appendChild(opt);
      }

      // We need to fetch regions from somewhere. We'll use getCurrentAll as a proxy to get metadata
      API.getCurrentAll().then(data => {
        if(!data) return;
        const regionSelect = document.getElementById('filter-region');
        const govSelect = document.getElementById('filter-gov');

        const regions = [...new Set(data.map(c => c.region).filter(Boolean))].sort();
        regions.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r; opt.textContent = r;
          regionSelect.appendChild(opt);
        });

        regionSelect.addEventListener('change', () => {
          const r = regionSelect.value;
          if(!r) {
            govSelect.innerHTML = '<option value="">Tous les Gouvernorats</option>';
            govSelect.disabled = true;
          } else {
            const govs = [...new Set(data.filter(c => c.region === r).map(c => c.governorate).filter(Boolean))].sort();
            govSelect.innerHTML = '<option value="">Tous les Gouvernorats</option>';
            govs.forEach(g => {
              const opt = document.createElement('option');
              opt.value = g; opt.textContent = g;
              govSelect.appendChild(opt);
            });
            govSelect.disabled = false;
          }
          fetchAnalysis();
        });

        govSelect.addEventListener('change', fetchAnalysis);
      }).catch(()=>console.error("Could not fetch filter metadata."));

      yearSelect.addEventListener('change', fetchAnalysis);
    }

    async function fetchAnalysis() {
      const year = document.getElementById('filter-year').value;
      const region = document.getElementById('filter-region').value;
      const gov = document.getElementById('filter-gov').value;

      const loading = document.getElementById('charts-loading');
      loading.style.display = 'flex';

      try {
        let params = { year };
        if(region) params.region = region;
        if(gov) params.governorate = gov;

        const data = await API.getMonthly(params);
        // Fill missing months with nulls for clean charts
        const cleanData = [];
        for(let m = 1; m <= 12; m++) {
          const row = data.find(d => d.month === m) || { month: m };
          cleanData.push(row);
        }
        currentData = cleanData;

        renderCharts(cleanData);
        renderTable(cleanData);
      } catch (err) {
        console.error("Failed to load analysis", err);
        document.getElementById('table-body').innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--accent-red);">Erreur de chargement.</td></tr>';
      } finally {
        loading.style.display = 'none';
      }
    }

    function renderCharts(data) {
      const theme = localStorage.getItem('meteo_theme') || 'dark';
      const fontColor = theme === 'dark' ? '#E8F4FD' : '#0D1B2A';

      const xMonths = data.map(d => MONTHS[d.month - 1]);
      const layoutBase = {
        paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
        font: { color: fontColor },
        margin: { t: 10, r: 20, l: 40, b: 30 },
        xaxis: { gridcolor: 'rgba(128,128,128,0.1)' },
        yaxis: { gridcolor: 'rgba(128,128,128,0.1)' },
        hovermode: 'x unified'
      };

      // 1. Temperature
      Plotly.newPlot('chart-temp', [
        { x: xMonths, y: data.map(d => d.max_temp), name: 'Max', type: 'scatter', line: {color: '#FF4757', shape: 'spline'} },
        { x: xMonths, y: data.map(d => d.avg_temp), name: 'Moy', type: 'scatter', line: {color: '#FFB800', shape: 'spline'} },
        { x: xMonths, y: data.map(d => d.min_temp), name: 'Min', type: 'scatter', line: {color: '#2D8CFF', shape: 'spline'} }
      ], layoutBase, {responsive: true});

      // 2. Precipitation
      const precipData = data.map(d => d.avg_precip || 0);
      Plotly.newPlot('chart-precip', [{
        x: xMonths, y: precipData, type: 'bar',
        marker: { color: precipData, colorscale: [[0, 'rgba(0,212,255,0.2)'], [1, '#1A5FA8']] }
      }], layoutBase, {responsive: true});

      // 3. Humidity (Area)
      Plotly.newPlot('chart-humidity', [{
        x: xMonths, y: data.map(d => d.avg_humidity), type: 'scatter', fill: 'tozeroy',
        line: {color: '#00D4FF', shape: 'spline'}, fillcolor: 'rgba(0, 212, 255, 0.2)'
      }], layoutBase, {responsive: true});

      // 4. Wind Speed
      Plotly.newPlot('chart-wind', [{
        x: xMonths, y: data.map(d => d.avg_wind_speed), type: 'scatter',
        line: {color: '#00B4A6', width: 3, shape: 'spline'}
      }], layoutBase, {responsive: true});
    }

    function renderTable(data) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      data.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${MONTHS[d.month - 1]}</td>
          <td>${d.avg_temp !== undefined ? d.avg_temp.toFixed(1) + '°C' : '--'}</td>
          <td style="color:var(--accent-red);">${d.max_temp !== undefined ? d.max_temp.toFixed(1) + '°C' : '--'}</td>
          <td style="color:var(--accent-blue);">${d.min_temp !== undefined ? d.min_temp.toFixed(1) + '°C' : '--'}</td>
          <td>${d.avg_humidity !== undefined ? d.avg_humidity.toFixed(1) + '%' : '--'}</td>
          <td>${d.avg_precip !== undefined ? d.avg_precip.toFixed(1) + 'mm' : '--'}</td>
          <td>${d.avg_wind_speed !== undefined ? d.avg_wind_speed.toFixed(1) + 'km/h' : '--'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Vanilla JS Table Sorting
    function sortTable(colIndex, type) {
      const table = document.getElementById("analysis-table");
      const tbody = table.querySelector("tbody");
      const rows = Array.from(tbody.querySelectorAll("tr"));

      // toggle direction
      sortDirection[colIndex] = !sortDirection[colIndex];
      const asc = sortDirection[colIndex];

      rows.sort((a, b) => {
        let valA = a.cells[colIndex].innerText.replace(/[^0-9.-]+/g,"");
        let valB = b.cells[colIndex].innerText.replace(/[^0-9.-]+/g,"");

        if(valA === '') valA = asc ? Infinity : -Infinity;
        if(valB === '') valB = asc ? Infinity : -Infinity;

        if (type === 'number') {
          return asc ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
        } else {
          return asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        }
      });

      rows.forEach(row => tbody.appendChild(row));
    }

    function exportToCSV() {
      if(!currentData || currentData.length === 0) return;
      const headers = ["Mois", "Temp Moy", "Temp Max", "Temp Min", "Humidite", "Precipitation", "Vent"];
      const rows = currentData.map(d => [
        MONTHS[d.month - 1],
        d.avg_temp || '', d.max_temp || '', d.min_temp || '',
        d.avg_humidity || '', d.avg_precip || '', d.avg_wind_speed || ''
      ]);

      let csvContent = "data:text/csv;charset=utf-8,"
        + headers.join(",") + "\n"
        + rows.map(e => e.join(",")).join("\n");

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `meteo_analyse_${document.getElementById('filter-year').value}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Handle theme toggle redrawing charts
    document.addEventListener('themeChanged', () => {
      if(currentData && currentData.length > 0) renderCharts(currentData);
    });

    document.addEventListener('DOMContentLoaded', async () => {
      Auth.requireAuth();
      await loadNavbar();
      Theme.init();
      VideoBg.setFromTime();

      setupFilters();
      fetchAnalysis(); // Load initial data
    });
  </script>
</body>
</html>

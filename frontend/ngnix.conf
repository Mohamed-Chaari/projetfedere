server {
    listen 80;
    server_name localhost;
    include /etc/nginx/mime.types;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Si le fichier n'existe pas, Nginx renvoie 404 au lieu de boucler
        try_files $uri $uri/ =404;
    }
    location /video/ {
    root /usr/share/nginx/html;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    # Autorise le streaming fluide
    add_header Accept-Ranges bytes;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend "api";
        proxy_pass http://$backend:8000/;
        proxy_set_header Host $host;
    }
}
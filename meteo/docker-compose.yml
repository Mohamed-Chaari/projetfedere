# ──────────────────────────────────────────────────────────────
#  Météo Tunisie — Docker Compose (Cloud-Native)
#  Projet TD5 — ISIMS Sfax
#
#  Infrastructure:
#    • Kafka       → Aiven Cloud (SSL)
#    • PostgreSQL  → Supabase
#    • Airflow     → Local orchestration, connects to cloud services
#
#  Topics are managed via the Aiven Cloud Console.
#  Database schema is managed via Supabase Dashboard / migrations.
#
#  Usage:
#    docker-compose up -d
# ──────────────────────────────────────────────────────────────

version: '3.8'

services:

  # ═══════════════════════════════════════════════════════════
  #  AIRFLOW — DAG orchestration for scheduled producers
  #  Connects to Supabase (PostgreSQL) and Aiven (Kafka)
  # ═══════════════════════════════════════════════════════════
  airflow:
    image: apache/airflow:2.8.0
    container_name: meteo-airflow
    ports:
      - '8080:8080'
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PARALLELISM: 16
      AIRFLOW__CORE__DAG_CONCURRENCY: 8
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: 2
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Africa/Tunis
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD}
          --firstname Admin --lastname User --role Admin
          --email admin@meteo.tn || true &&
        airflow webserver --port 8080 &
        airflow scheduler
      "
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env
    networks:
      - meteo-network

# ═══════════════════════════════════════════════════════════
#  NETWORK
# ═══════════════════════════════════════════════════════════
networks:
  meteo-network:
    driver: bridge
    name: meteo-network

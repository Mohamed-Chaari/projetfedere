name: Weather Pipeline

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KAFKA_BOOTSTRAP: ${{ secrets.KAFKA_BOOTSTRAP }}
      KAFKA_SECURITY_PROTOCOL: SSL
      KAFKA_CA_FILE: ca.pem
      KAFKA_CERT_FILE: service.cert
      KAFKA_KEY_FILE: service.key
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
    defaults:
      run:
        working-directory: meteo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Recreate Kafka SSL certificate files
        env:
          KAFKA_CA_CERT_SECRET: ${{ secrets.KAFKA_CA_CERT_SECRET }}
          KAFKA_SERVICE_CERT_SECRET: ${{ secrets.KAFKA_SERVICE_CERT_SECRET }}
          KAFKA_SERVICE_KEY_SECRET: ${{ secrets.KAFKA_SERVICE_KEY_SECRET }}
        run: |
          printf "%s" "$KAFKA_CA_CERT_SECRET" > ca.pem
          printf "%s" "$KAFKA_SERVICE_CERT_SECRET" > service.cert
          printf "%s" "$KAFKA_SERVICE_KEY_SECRET" > service.key
          chmod 600 ca.pem service.cert service.key

      - name: Run producer
        run: |
          python -m src.producer --mode once

      - name: Run consumer
        run: |
          python -m src.consumer --mode batch

      - name: Clean up SSL certificate files
        if: always()
        run: |
          if command -v shred >/dev/null 2>&1; then
            for f in service.key service.cert ca.pem; do
              if [ -f "$f" ] && ! shred -u "$f"; then
                rm -f "$f"
                echo "Warning: secure deletion failed for $f; removed with rm"
              fi
            done
          else
            rm -f ca.pem service.cert service.key
          fi
